<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fiskrbak Explorer</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #020617;
            --card-bg: rgba(15, 23, 42, 0.85);
            --accent: #ffffff;
            --danger: #ef4444;
            --success: #22c55e;
            --warning: #f59e0b;
            --text-main: #f8fafc;
            --text-dim: #cbd5e1;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('gundarlun.webp'); 
            background-size: cover;
            background-position: center;
            opacity: 0.6; 
            filter: saturate(1.2) contrast(1.1);
            z-index: -2;
        }

        body::after {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 30%, rgba(0,0,0,0.85) 100%);
            z-index: -1;
        }

        .app-container { max-width: 500px; width: 100%; z-index: 1; }

        header {
            text-align: center;
            border-bottom: 2px solid var(--accent);
            margin-bottom: 25px;
            padding-bottom: 15px;
            background: rgba(15, 23, 42, 0.8);
            border-radius: 0 0 15px 15px;
            backdrop-filter: blur(5px);
        }

        header h1 { margin: 0; font-size: 1.8rem; color: var(--accent); text-transform: uppercase; text-shadow: 0 0 10px rgba(255,255,255,0.3); }
        header p { margin: 5px 0; font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 2px; }

        .section-header {
            font-size: 0.85rem;
            font-weight: bold;
            color: var(--accent);
            margin: 25px 0 12px 0;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 8px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.9);
        }

        .grid-locations {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .location-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 15px;
            border-radius: 12px;
            cursor: pointer;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            backdrop-filter: blur(8px);
            transition: 0.2s;
        }

        .location-card:hover { border-color: var(--accent); background: rgba(255, 255, 255, 0.1); }
        .location-card i { color: var(--accent); font-size: 28px; }
        .location-name { font-weight: bold; font-size: 0.9rem; color: #fff; }

        .island-list {
            background: var(--card-bg);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
        }

        .island-item {
            padding: 14px 18px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.95rem;
        }
        
        .badge {
            font-size: 0.65rem;
            padding: 6px 12px;
            border-radius: 6px;
            text-transform: uppercase;
            font-weight: 900;
            cursor: pointer;
            user-select: none;
            transition: all 0.2s ease;
            min-width: 95px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.2);
            color: #ffffff;
        }

        .badge-warn { background: var(--warning); }
        .badge-red { background: var(--danger); }
        .badge-green { background: var(--success); }

        #detail-view {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: #0a0f1e;
            padding: 25px;
            border-top: 4px solid var(--accent);
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 100;
        }

        #detail-view.active { transform: translateY(0); }
        .close-btn { 
            background: var(--accent); color: #000; 
            padding: 5px 12px; border-radius: 4px; 
            font-size: 0.7rem; font-weight: bold; float: right; cursor: pointer; 
        }
    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <p style="padding-top: 20px;">Sistema de Navegaci&oacute;n Local</p>
            <h1>Fiskrbak</h1>
        </header>

        <div class="section-header">
            <span class="material-icons">castle</span> Lugares de Fiskrbak
        </div>
        
        <div class="grid-locations">
            <div class="location-card" onclick="showDetail('Fuerte Jarl Frostgale', 'Gran sal&oacute;n de fiestas con techo de paja. Las puertas de la c&aacute;mara est&aacute;n decoradas con las colosales fauces de un tibur&oacute;n monstruoso. Aqu&iacute; reside el control militar de la zona.')">
                <i class="material-icons">fort</i>
                <span class="location-name">Fuerte Frostgale</span>
            </div>
            <div class="location-card" onclick="showDetail('Hogar Rimewave', 'Hogar de humildes pescadores, conocidos en el pueblo, pero han desaparecido.')">
                <i class="material-icons">ac_unit</i>
                <span class="location-name">Hogar Rimewave</span>
            </div>
        </div>

        <div class="section-header">
            <span class="material-icons">explore</span> Exploraci&oacute;n de la Isla
        </div>

        <div class="island-list">
            <div class="island-item">
                <span><a href="mapa-local-gundbarg-v2.html" style="color: #fff;">Gundbarg</a></span>
                <span class="badge badge-green" data-index="2" onclick="cycleStatus(this)">Explorado</span>
            </div>
            <div class="island-item">
                <span>Gruta de la Horca</span>
                <span class="badge badge-warn" data-index="0" onclick="cycleStatus(this)">Inexplorado</span>
            </div>
            <div class="island-item">
                <span>Lugar del Accidente</span>
                <span class="badge badge-warn" data-index="0" onclick="cycleStatus(this)">Inexplorado</span>
            </div>
            <div class="island-item">
                <span>Ruinas de Berranzo</span>
                <span class="badge badge-warn" data-index="0" onclick="cycleStatus(this)">Inexplorado</span>
            </div>
            <div class="island-item">
                <span>Golden Crown</span>
                <span class="badge badge-warn" data-index="0" onclick="cycleStatus(this)">Inexplorado</span>
            </div>
        </div>
    </div>

    <div id="detail-view">
        <div class="close-btn" onclick="closeDetail()">CERRAR</div>
        <h2 id="detail-title" style="margin-top:0; color:var(--accent)"></h2>
        <p id="detail-text"></p>
    </div>

    <script>
		function showDetail(title, text) {
			document.getElementById('detail-title').innerHTML = title;
			document.getElementById('detail-text').innerHTML = text;
			document.getElementById('detail-view').classList.add('active');
		}
		function closeDetail() {
			document.getElementById('detail-view').classList.remove('active');
		}

		const states = [
			{ text: 'Inexplorado', class: 'badge-warn' },
			{ text: 'Peligro', class: 'badge-red' },
			{ text: 'Explorado', class: 'badge-green' }
		];

		function cycleStatus(el) {
			let currentIndex = parseInt(el.getAttribute('data-index'));
			let nextIndex = (currentIndex + 1) % states.length;
			
			applyStatus(el, nextIndex);

			// GUARDAR: Usamos el texto del nombre (el span anterior) como clave
			const placeName = el.parentElement.firstElementChild.innerText;
			localStorage.setItem('gundarlun_' + placeName, nextIndex);
		}

		// Función auxiliar para aplicar el estado visualmente
		function applyStatus(el, index) {
			el.innerText = states[index].text;
			el.className = 'badge ' + states[index].class;
			el.setAttribute('data-index', index);
		}

		// CARGAR: Al abrir la página
		window.addEventListener('DOMContentLoaded', () => {
			document.querySelectorAll('.badge').forEach(el => {
				const placeName = el.parentElement.firstElementChild.innerText;
				const savedIndex = localStorage.getItem('gundarlun_' + placeName);
				
				if (savedIndex !== null) {
					applyStatus(el, parseInt(savedIndex));
				}
			});
		});
	</script>
</body>
</html>
